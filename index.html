<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amadeus - Mozart's Musical Quest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            color: #e0e0e0;
        }
        canvas {
            border: 3px solid #c9a227;
            border-radius: 4px;
            display: block;
        }
        #ui {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        .instrument-slot {
            padding: 5px 12px;
            border: 1px solid #555;
            border-radius: 4px;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .instrument-slot.unlocked {
            opacity: 1;
            border-color: #c9a227;
            background: rgba(201, 162, 39, 0.15);
        }
        #controls-info {
            margin-top: 8px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="600"></canvas>
    <div id="ui">
        <span class="instrument-slot" id="slot-violin">🎻 Violin: Sound Wave</span>
        <span class="instrument-slot" id="slot-flute">🪈 Flute: Float Jump</span>
        <span class="instrument-slot" id="slot-piano">🎹 Piano: Ground Pound</span>
    </div>
    <div id="controls-info">
        Arrow Keys: Move | Space: Jump | X: Attack | Collect instruments to unlock abilities!
    </div>

    <script>
    // ============================================================
    // INPUT MANAGER
    // ============================================================
    class Input {
        constructor() {
            this.keys = {};
            this.justPressed = {};
            window.addEventListener('keydown', e => {
                if (!this.keys[e.code]) this.justPressed[e.code] = true;
                this.keys[e.code] = true;
                e.preventDefault();
            });
            window.addEventListener('keyup', e => {
                this.keys[e.code] = false;
            });
        }

        isDown(code) { return !!this.keys[code]; }
        wasPressed(code) { return !!this.justPressed[code]; }
        clearFrame() { this.justPressed = {}; }
    }

    // ============================================================
    // PROJECTILE (Sound Wave)
    // ============================================================
    class Projectile {
        constructor(x, y, direction) {
            this.x = x;
            this.y = y;
            this.width = 20;
            this.height = 8;
            this.speed = 7;
            this.direction = direction;
            this.life = 80;
            this.active = true;
        }

        update() {
            this.x += this.speed * this.direction;
            this.life--;
            if (this.life <= 0) this.active = false;
        }

        draw(ctx) {
            const alpha = Math.min(1, this.life / 20);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#f0c040';
            ctx.beginPath();
            ctx.ellipse(this.x, this.y, this.width / 2, this.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            // Wave lines
            ctx.strokeStyle = '#ffdd70';
            ctx.lineWidth = 2;
            for (let i = 0; i < 3; i++) {
                const offset = (80 - this.life + i * 8) * this.direction;
                ctx.beginPath();
                ctx.arc(this.x - offset * 0.3, this.y, 4 + i * 3, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();
        }
    }

    // ============================================================
    // GROUND POUND EFFECT
    // ============================================================
    class GroundPoundEffect {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.radius = 0;
            this.maxRadius = 100;
            this.life = 20;
            this.active = true;
        }

        update() {
            this.radius += 8;
            this.life--;
            if (this.life <= 0) this.active = false;
        }

        draw(ctx) {
            const alpha = this.life / 20;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = '#ff6644';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, Math.PI, 0);
            ctx.stroke();
            ctx.restore();
        }
    }

    // ============================================================
    // ENEMY
    // ============================================================
    class Enemy {
        constructor(x, y, patrolRange) {
            this.x = x;
            this.y = y;
            this.width = 30;
            this.height = 30;
            this.startX = x;
            this.patrolRange = patrolRange || 100;
            this.speed = 1.5;
            this.direction = 1;
            this.active = true;
            this.stunTimer = 0;
            this.health = 1;
        }

        update() {
            if (this.stunTimer > 0) {
                this.stunTimer--;
                return;
            }
            this.x += this.speed * this.direction;
            if (this.x > this.startX + this.patrolRange || this.x < this.startX - this.patrolRange) {
                this.direction *= -1;
            }
        }

        draw(ctx) {
            ctx.fillStyle = this.stunTimer > 0 ? '#888' : '#cc3333';
            ctx.fillRect(this.x - this.width / 2, this.y - this.height, this.width, this.height);
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(this.x - 8, this.y - this.height + 8, 6, 6);
            ctx.fillRect(this.x + 2, this.y - this.height + 8, 6, 6);
            if (this.stunTimer > 0) {
                ctx.fillStyle = '#ffff00';
                ctx.font = '12px serif';
                ctx.textAlign = 'center';
                ctx.fillText('★', this.x, this.y - this.height - 5);
            }
        }

        hit() {
            this.health--;
            if (this.health <= 0) this.active = false;
        }

        stun(duration) {
            this.stunTimer = duration;
        }
    }

    // ============================================================
    // INSTRUMENT COLLECTIBLE
    // ============================================================
    class Instrument {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type; // 'violin', 'flute', 'piano'
            this.width = 30;
            this.height = 30;
            this.collected = false;
            this.bobOffset = 0;
        }

        update() {
            this.bobOffset = Math.sin(Date.now() / 300) * 5;
        }

        draw(ctx) {
            if (this.collected) return;
            const y = this.y + this.bobOffset;
            // Glow
            ctx.save();
            ctx.shadowColor = '#c9a227';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#c9a227';
            ctx.beginPath();
            ctx.arc(this.x, y, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            // Icon
            ctx.font = '20px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const icons = { violin: '🎻', flute: '🪈', piano: '🎹' };
            ctx.fillText(icons[this.type] || '🎵', this.x, y);
        }
    }

    // ============================================================
    // PLAYER (Mozart)
    // ============================================================
    class Player {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = 24;
            this.height = 40;
            this.vx = 0;
            this.vy = 0;
            this.speed = 4;
            this.jumpForce = -12;
            this.gravity = 0.6;
            this.grounded = false;
            this.facing = 1;
            this.health = 3;
            this.invincible = 0;

            // Power-up state
            this.collectedInstruments = new Set();
            this.hasJumped = false;
            this.hasUsedFluteFloat = false;
            this.isFloating = false;
            this.floatTimer = 0;
            this.isGroundPounding = false;
            this.attackCooldown = 0;
        }

        update(input, platforms, projectiles, effects) {
            // Horizontal movement
            this.vx = 0;
            if (input.isDown('ArrowLeft')) { this.vx = -this.speed; this.facing = -1; }
            if (input.isDown('ArrowRight')) { this.vx = this.speed; this.facing = 1; }

            // Jump
            if (input.wasPressed('Space')) {
                if (this.grounded) {
                    this.vy = this.jumpForce;
                    this.grounded = false;
                    this.hasJumped = true;
                    this.hasUsedFluteFloat = false;
                } else if (this.hasJumped && !this.hasUsedFluteFloat && this.collectedInstruments.has('flute')) {
                    // Flute float: brief upward boost + slow fall
                    this.vy = -6;
                    this.hasUsedFluteFloat = true;
                    this.isFloating = true;
                    this.floatTimer = 30;
                }
            }

            // Float mechanic
            if (this.isFloating) {
                this.floatTimer--;
                this.vy = Math.min(this.vy, 1); // slow descent while floating
                if (this.floatTimer <= 0) this.isFloating = false;
            }

            // Attack key (X)
            if (input.wasPressed('KeyX') && this.attackCooldown <= 0) {
                if (!this.grounded && this.collectedInstruments.has('piano')) {
                    // Piano ground pound (priority when airborne with piano)
                    this.isGroundPounding = true;
                    this.vy = 15;
                    this.vx = 0;
                    this.isFloating = false;
                    this.attackCooldown = 20;
                } else if (this.collectedInstruments.has('violin')) {
                    // Violin sound wave projectile
                    projectiles.push(new Projectile(this.x + this.facing * 20, this.y - this.height / 2, this.facing));
                    this.attackCooldown = 15;
                }
            }

            if (this.attackCooldown > 0) this.attackCooldown--;
            if (this.invincible > 0) this.invincible--;

            // Gravity
            if (!this.isGroundPounding) {
                this.vy += this.gravity;
            }
            this.vy = Math.min(this.vy, 15);

            // Apply velocity
            this.x += this.vx;
            this.y += this.vy;

            // Platform collision
            this.grounded = false;
            for (const p of platforms) {
                if (this.x + this.width / 2 > p.x &&
                    this.x - this.width / 2 < p.x + p.width &&
                    this.y >= p.y && this.y - this.height < p.y + p.height &&
                    this.vy >= 0) {
                    if (this.y - this.vy <= p.y + 2) {
                        this.y = p.y;
                        this.vy = 0;
                        this.grounded = true;
                        this.hasJumped = false;
                        this.hasUsedFluteFloat = false;
                        this.isFloating = false;

                        // Ground pound landing effect
                        if (this.isGroundPounding) {
                            this.isGroundPounding = false;
                            effects.push(new GroundPoundEffect(this.x, this.y));
                            return 'ground_pound_landed';
                        }
                    }
                }
            }

            // World bounds
            if (this.x < this.width / 2) this.x = this.width / 2;
            if (this.x > 800 - this.width / 2) this.x = 800 - this.width / 2;

            // Fall death
            if (this.y > 650) {
                this.health--;
                return 'died';
            }

            return null;
        }

        draw(ctx) {
            if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) return;

            ctx.save();
            // Body
            ctx.fillStyle = '#4a90d9';
            ctx.fillRect(this.x - this.width / 2, this.y - this.height, this.width, this.height);
            // Head
            ctx.fillStyle = '#ffd7a3';
            ctx.beginPath();
            ctx.arc(this.x, this.y - this.height - 8, 10, 0, Math.PI * 2);
            ctx.fill();
            // Wig (Mozart's iconic white wig)
            ctx.fillStyle = '#f0f0f0';
            ctx.beginPath();
            ctx.arc(this.x, this.y - this.height - 12, 10, Math.PI, 0);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x - 10, this.y - this.height - 6, 5, 0, Math.PI * 2);
            ctx.arc(this.x + 10, this.y - this.height - 6, 5, 0, Math.PI * 2);
            ctx.fill();

            // Float effect
            if (this.isFloating) {
                ctx.strokeStyle = '#88ccff';
                ctx.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    const ox = Math.sin(Date.now() / 200 + i) * 10;
                    ctx.beginPath();
                    ctx.arc(this.x + ox, this.y + 5 + i * 4, 3, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            // Ground pound effect
            if (this.isGroundPounding) {
                ctx.fillStyle = '#ff6644';
                ctx.beginPath();
                ctx.moveTo(this.x - 10, this.y);
                ctx.lineTo(this.x, this.y + 10);
                ctx.lineTo(this.x + 10, this.y);
                ctx.fill();
            }

            ctx.restore();
        }

        takeDamage() {
            if (this.invincible > 0) return false;
            this.health--;
            this.invincible = 60;
            return true;
        }

        collectInstrument(type) {
            this.collectedInstruments.add(type);
        }
    }

    // ============================================================
    // LEVEL DATA
    // ============================================================
    function createLevels() {
        return [
            // Level 1: Collect the Violin - basic platforming, then enemy corridor to test it
            {
                name: 'Level 1: The Concert Hall',
                platforms: [
                    { x: 0, y: 580, width: 800, height: 20 },
                    { x: 100, y: 480, width: 120, height: 15 },
                    { x: 300, y: 420, width: 120, height: 15 },
                    { x: 500, y: 360, width: 120, height: 15 },
                    { x: 650, y: 300, width: 150, height: 15 },
                    // Post-violin corridor area
                    { x: 0, y: 250, width: 200, height: 15 },
                ],
                enemies: [
                    new Enemy(200, 580, 80),
                    new Enemy(450, 580, 60),
                    // Enemies to test violin on
                    new Enemy(100, 250, 70),
                    new Enemy(650, 580, 50),
                ],
                instrument: new Instrument(700, 270, 'violin'),
                exitX: 50,
                exitY: 220,
                spawnX: 50,
                spawnY: 560,
            },
            // Level 2: Collect the Flute - gaps requiring double jump
            {
                name: 'Level 2: The Rooftops',
                platforms: [
                    { x: 0, y: 580, width: 150, height: 20 },
                    { x: 250, y: 520, width: 100, height: 15 },
                    { x: 420, y: 450, width: 100, height: 15 },
                    { x: 580, y: 380, width: 100, height: 15 },
                    { x: 700, y: 320, width: 100, height: 15 },
                    // Wide gap section after flute
                    { x: 0, y: 260, width: 80, height: 15 },
                    { x: 300, y: 230, width: 80, height: 15 },
                    { x: 600, y: 200, width: 120, height: 15 },
                ],
                enemies: [
                    new Enemy(280, 520, 40),
                    new Enemy(450, 450, 40),
                    new Enemy(330, 230, 30),
                ],
                instrument: new Instrument(740, 290, 'flute'),
                exitX: 650,
                exitY: 170,
                spawnX: 50,
                spawnY: 560,
            },
            // Level 3: Collect the Piano - airborne enemies need ground pound
            {
                name: 'Level 3: The Grand Stage',
                platforms: [
                    { x: 0, y: 580, width: 800, height: 20 },
                    { x: 100, y: 460, width: 150, height: 15 },
                    { x: 350, y: 380, width: 150, height: 15 },
                    { x: 550, y: 300, width: 150, height: 15 },
                    { x: 200, y: 220, width: 150, height: 15 },
                    { x: 450, y: 160, width: 200, height: 15 },
                    // Platform cluster for ground pound testing
                    { x: 50, y: 130, width: 120, height: 15 },
                    { x: 680, y: 130, width: 120, height: 15 },
                ],
                enemies: [
                    new Enemy(200, 580, 100),
                    new Enemy(500, 580, 80),
                    new Enemy(400, 380, 60),
                    new Enemy(250, 220, 60),
                    new Enemy(500, 160, 80),
                    new Enemy(80, 130, 40),
                    new Enemy(720, 130, 40),
                ],
                instrument: new Instrument(550, 130, 'piano'),
                exitX: 750,
                exitY: 100,
                spawnX: 50,
                spawnY: 560,
            },
        ];
    }

    // ============================================================
    // GAME
    // ============================================================
    class Game {
        constructor() {
            this.canvas = document.getElementById('game');
            this.ctx = this.canvas.getContext('2d');
            this.input = new Input();
            this.levels = createLevels();
            this.currentLevel = 0;
            this.projectiles = [];
            this.effects = [];
            this.player = new Player(50, 560);
            this.state = 'playing'; // 'playing', 'levelComplete', 'gameOver', 'victory'
            this.messageTimer = 0;
            this.message = '';
            this.loadLevel(0);
            this.loop();
        }

        loadLevel(index) {
            if (index >= this.levels.length) {
                this.state = 'victory';
                return;
            }
            this.currentLevel = index;
            // Recreate enemies for fresh level
            this.levels = createLevels();
            const level = this.levels[index];
            this.player.x = level.spawnX;
            this.player.y = level.spawnY;
            this.player.vy = 0;
            this.player.vx = 0;
            this.player.isGroundPounding = false;
            this.player.isFloating = false;
            this.projectiles = [];
            this.effects = [];
            this.state = 'playing';
            this.showMessage(level.name, 120);
        }

        showMessage(msg, duration) {
            this.message = msg;
            this.messageTimer = duration;
        }

        get level() { return this.levels[this.currentLevel]; }

        update() {
            if (this.state === 'gameOver' || this.state === 'victory') {
                if (this.input.wasPressed('Space')) {
                    this.player = new Player(50, 560);
                    this.loadLevel(0);
                }
                this.input.clearFrame();
                return;
            }

            if (this.state === 'levelComplete') {
                if (this.input.wasPressed('Space')) {
                    this.loadLevel(this.currentLevel + 1);
                }
                this.input.clearFrame();
                return;
            }

            if (this.messageTimer > 0) this.messageTimer--;

            // Player update
            const result = this.player.update(this.input, this.level.platforms, this.projectiles, this.effects);
            if (result === 'died') {
                if (this.player.health <= 0) {
                    this.state = 'gameOver';
                } else {
                    this.player.x = this.level.spawnX;
                    this.player.y = this.level.spawnY;
                    this.player.vy = 0;
                    this.player.invincible = 60;
                }
            }
            if (result === 'ground_pound_landed') {
                // Stun nearby enemies
                for (const enemy of this.level.enemies) {
                    if (!enemy.active) continue;
                    const dist = Math.abs(enemy.x - this.player.x);
                    if (dist < 100 && Math.abs(enemy.y - this.player.y) < 50) {
                        enemy.stun(90);
                    }
                }
            }

            // Projectiles
            for (const p of this.projectiles) {
                p.update();
                // Hit enemies
                for (const enemy of this.level.enemies) {
                    if (!enemy.active) continue;
                    if (Math.abs(p.x - enemy.x) < 25 && Math.abs(p.y - (enemy.y - enemy.height / 2)) < 20) {
                        enemy.hit();
                        p.active = false;
                    }
                }
            }
            this.projectiles = this.projectiles.filter(p => p.active);

            // Effects
            for (const e of this.effects) e.update();
            this.effects = this.effects.filter(e => e.active);

            // Enemies
            for (const enemy of this.level.enemies) {
                if (!enemy.active) continue;
                enemy.update();
                // Player collision
                if (Math.abs(this.player.x - enemy.x) < 25 &&
                    Math.abs(this.player.y - this.player.height / 2 - (enemy.y - enemy.height / 2)) < 30) {
                    if (enemy.stunTimer <= 0) {
                        this.player.takeDamage();
                        if (this.player.health <= 0) this.state = 'gameOver';
                    }
                }
            }

            // Instrument collection
            const inst = this.level.instrument;
            if (inst && !inst.collected) {
                inst.update();
                if (Math.abs(this.player.x - inst.x) < 30 &&
                    Math.abs((this.player.y - this.player.height / 2) - inst.y) < 30) {
                    inst.collected = true;
                    this.player.collectInstrument(inst.type);
                    this.updateUI();
                    const names = { violin: '🎻 Violin', flute: '🪈 Flute', piano: '🎹 Piano' };
                    const abilities = { violin: 'Sound Wave (X)', flute: 'Float Jump (Space x2)', piano: 'Ground Pound (X in air)' };
                    this.showMessage(`${names[inst.type]} collected! Ability: ${abilities[inst.type]}`, 150);
                }
            }

            // Check exit
            if (this.level.instrument && this.level.instrument.collected) {
                const dx = Math.abs(this.player.x - this.level.exitX);
                const dy = Math.abs(this.player.y - this.level.exitY);
                if (dx < 30 && dy < 40) {
                    this.state = 'levelComplete';
                    this.showMessage('Level Complete! Press Space to continue', 999);
                }
            }

            this.input.clearFrame();
        }

        updateUI() {
            const instruments = ['violin', 'flute', 'piano'];
            for (const inst of instruments) {
                const el = document.getElementById(`slot-${inst}`);
                if (this.player.collectedInstruments.has(inst)) {
                    el.classList.add('unlocked');
                } else {
                    el.classList.remove('unlocked');
                }
            }
        }

        draw() {
            const ctx = this.ctx;
            // Background gradient
            const grad = ctx.createLinearGradient(0, 0, 0, 600);
            grad.addColorStop(0, '#1a1a3e');
            grad.addColorStop(1, '#2a1a4e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 800, 600);

            if (this.state === 'gameOver') {
                ctx.fillStyle = '#ff4444';
                ctx.font = '48px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', 400, 280);
                ctx.font = '20px Georgia';
                ctx.fillStyle = '#ccc';
                ctx.fillText('Press Space to restart', 400, 330);
                return;
            }

            if (this.state === 'victory') {
                ctx.fillStyle = '#c9a227';
                ctx.font = '48px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText('🎵 Victory! 🎵', 400, 250);
                ctx.font = '20px Georgia';
                ctx.fillStyle = '#ccc';
                ctx.fillText('Mozart has collected all instruments!', 400, 300);
                ctx.fillText('Press Space to play again', 400, 340);
                return;
            }

            // Platforms
            for (const p of this.level.platforms) {
                ctx.fillStyle = '#5a4a3a';
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = '#7a6a5a';
                ctx.fillRect(p.x, p.y, p.width, 3);
            }

            // Exit indicator
            if (this.level.instrument && this.level.instrument.collected) {
                ctx.save();
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 300) * 0.3;
                ctx.fillStyle = '#44ff44';
                ctx.beginPath();
                ctx.arc(this.level.exitX, this.level.exitY - 15, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '14px Georgia';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.globalAlpha = 1;
                ctx.fillText('EXIT', this.level.exitX, this.level.exitY - 35);
                ctx.restore();
            }

            // Instrument
            if (this.level.instrument) this.level.instrument.draw(ctx);

            // Enemies
            for (const enemy of this.level.enemies) {
                if (enemy.active) enemy.draw(ctx);
            }

            // Projectiles
            for (const p of this.projectiles) p.draw(ctx);

            // Effects
            for (const e of this.effects) e.draw(ctx);

            // Player
            this.player.draw(ctx);

            // HUD
            ctx.fillStyle = '#fff';
            ctx.font = '16px Georgia';
            ctx.textAlign = 'left';
            ctx.fillText(`❤️ ${this.player.health}`, 10, 25);

            // Ability indicator
            let abilityText = '';
            if (this.player.collectedInstruments.has('violin')) abilityText += ' [X: Wave]';
            if (this.player.collectedInstruments.has('flute')) abilityText += ' [Space²: Float]';
            if (this.player.collectedInstruments.has('piano')) abilityText += ' [X↑: Pound]';
            if (abilityText) {
                ctx.fillStyle = '#c9a227';
                ctx.font = '12px Georgia';
                ctx.fillText('Abilities:' + abilityText, 10, 45);
            }

            // Message
            if (this.messageTimer > 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(150, 270, 500, 60);
                ctx.fillStyle = '#c9a227';
                ctx.font = '22px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText(this.message, 400, 308);
            }
        }

        loop() {
            this.update();
            this.draw();
            requestAnimationFrame(() => this.loop());
        }
    }

    // Start
    window.addEventListener('load', () => new Game());
    </script>
</body>
</html>
